<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图片表格 Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Image Table</p>
          <h1>可上传图片的双层表头表格</h1>
          <p class="hero-copy">
            顶部使用 Excel 风格的横向小标题，数据区每个单元格都支持上传一张图片并补充说明文字。
          </p>
        </div>
        <div class="hero-note">
          <p>交互说明</p>
          <ul>
            <li>点击任意单元格打开编辑抽屉</li>
            <li>右上方工具条可以新增、复制、移动或删除行</li>
            <li>移动端会自动切换为底部抽屉</li>
          </ul>
        </div>
      </header>

      <main id="app"></main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
